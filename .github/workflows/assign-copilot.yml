name: Assign Custom Cleanup Agent
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    if: github.event.label.name == 'cleanup-bot'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # We assign the workspace bot, but the body instructions 
          # will force it to use your .github/agents/cleanup-bot.agent.md configuration
          gh issue edit ${{ github.event.issue.number }} --add-assignee "github-copilot-workspace"
