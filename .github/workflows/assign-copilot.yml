name: Assign Copilot
on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  assign:
    if: github.event.label.name == 'copilot'
    runs-on: ubuntu-latest
    steps:
      - name: Assign Copilot via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api graphql -f query='
            mutation {
              addAssigneesToAssignable(input: {
                assignableId: "${{ github.event.issue.node_id }}"
                assigneeIds: ["BOT_kgDOC9w8XQ"]
              }) {
                assignable {
                  ... on Issue { id }
                }
              }
            }
          '
